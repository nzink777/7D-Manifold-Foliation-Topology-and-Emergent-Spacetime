name: Generate Worldline Visuals

on:
  push:
    branches:
      - main
    paths:
      - 'simulation_code/root_solver.py'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  run-simulation:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to write the generated image back to the repo

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Math Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy matplotlib

    - name: Execute Root Solver Engine
      run: |
        python simulation_code/root_solver.py

    - name: Commit and Push Generated Asset
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Only commit if the image actually changed or was newly created
        git add visual_assets/worldline_bifurcation.png
        if ! git diff --cached --quiet; then
          git commit -m "chore: automated updates to worldline bifurcation visual asset"
          git push
        else
          echo "No changes detected in the generated visualization."
        fi
        
