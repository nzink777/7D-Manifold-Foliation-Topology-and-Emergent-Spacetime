name: Generate and Update 7D Manifold Foliation Topology Graph Visuals

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render_plots:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib scipy

      - name: Run Graph Generation Engine
        run: |
          # The script internally handles creating simulation_code/results/
          python scripts/generate_huft_plots.py

      - name: Commit and Push Updated Visuals
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage only the targeted simulation results directory
          git add simulation_code/results/*.png
          
          if git diff --staged --quiet; then
            echo "No changes detected in simulation_code/results/."
          else
            git commit -m "chore: auto-regenerate simulation results [skip ci]"
            git push
          fi
          
